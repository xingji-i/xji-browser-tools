<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoTranslate</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FFFFFF;
      color: #1A202C;
      font-size: 14px;
    }

    .header {
      background: linear-gradient(135deg, #1A365D, #2B6CB0);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .header-logo svg {
      width: 24px;
      height: 24px;
      color: #63B3ED;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-subtitle {
      font-size: 12px;
      opacity: 0.7;
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background: #F7FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .status-card.error {
      background: #FFF5F5;
      border-color: #FED7D7;
    }

    .status-card.success {
      background: #F0FFF4;
      border-color: #C6F6D5;
    }

    .status-title {
      font-size: 12px;
      font-weight: 600;
      color: #718096;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-value {
      font-size: 14px;
      color: #2D3748;
    }

    .status-card.error .status-value {
      color: #C53030;
    }

    .status-card.success .status-value {
      color: #276749;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #4285F4;
      color: white;
    }

    .btn-primary:hover {
      background: #3367D6;
    }

    .btn-secondary {
      background: #EDF2F7;
      color: #4A5568;
    }

    .btn-secondary:hover {
      background: #E2E8F0;
    }

    .btn-outline {
      background: transparent;
      color: #4285F4;
      border: 1px solid #BEE3F8;
    }

    .btn-outline:hover {
      background: #EBF8FF;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #E2E8F0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #A0AEC0;
    }

    .footer a {
      color: #4285F4;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .shortcut {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-family: monospace;
      font-size: 11px;
      background: #EDF2F7;
      padding: 2px 6px;
      border-radius: 4px;
      color: #718096;
    }

    .divider {
      height: 1px;
      background: #E2E8F0;
      margin: 12px 0;
    }

    .usage-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 12px;
      color: #718096;
    }

    .usage-bar {
      width: 100%;
      height: 4px;
      background: #EDF2F7;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .usage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #48BB78, #38A169);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .usage-bar-fill.warning {
      background: linear-gradient(90deg, #ECC94B, #D69E2E);
    }

    .usage-bar-fill.danger {
      background: linear-gradient(90deg, #FC8181, #E53E3E);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2l1 3"/>
        <path d="M14 13l4 8 4-8M14 13h8"/>
      </svg>
      <span class="header-title">AutoTranslate</span>
    </div>
    <div class="header-subtitle">Azure Translator 驱动的双语对照翻译</div>
  </div>

  <div class="content">
    <!-- API 状态 -->
    <div class="status-card" id="api-status">
      <div class="status-title">API 状态</div>
      <div class="status-value" id="api-status-text">检查中...</div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-translate">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        翻译当前页面
      </button>
      <button class="btn btn-secondary" id="btn-scan">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        扫描页面内容
      </button>
      <button class="btn btn-outline" id="btn-settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68 1.65 1.65 0 0 0 10 3.17V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
    </div>

    <div class="divider"></div>

    <!-- 快捷键提示 -->
    <div class="usage-info">
      <span>打开面板</span>
      <span class="shortcut">Alt + T</span>
    </div>
    <div class="usage-info">
      <span>翻译页面</span>
      <span class="shortcut">Alt + Shift + T</span>
    </div>
  </div>

  <div class="footer">
    <span>AutoTranslate v1.0.0</span>
    <a href="#" id="link-options">更多设置</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
