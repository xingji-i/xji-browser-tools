<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档逐行高亮</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fafafa;
    }

    .header {
      background: linear-gradient(135deg, #ffb300, #ff8f00);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header svg {
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* 状态区域 */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .status-label {
      font-size: 12px;
      color: #666;
    }

    .status-value {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }

    .status-value.inactive {
      color: #aaa;
    }

    .toggle-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.on {
      background: #ffb300;
      color: white;
    }

    .toggle-btn.off {
      background: #e0e0e0;
      color: #666;
    }

    .toggle-btn:hover {
      opacity: 0.85;
    }

    /* 当前行预览 */
    .current-text {
      font-size: 11px;
      color: #666;
      background: #f0f0f0;
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 26px;
      line-height: 14px;
    }

    /* 跳转行 */
    .goto-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .goto-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }

    .goto-input:focus {
      border-color: #ffb300;
    }

    .goto-btn {
      padding: 6px 12px;
      background: #ffb300;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .goto-btn:hover {
      background: #ff8f00;
    }

    /* 颜色设置 */
    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .color-row:last-child {
      margin-bottom: 0;
    }

    .color-label {
      font-size: 12px;
      color: #555;
    }

    .color-input {
      width: 36px;
      height: 24px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      padding: 1px;
    }

    /* 快捷键提示 */
    .shortcuts {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .shortcut-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .shortcut-desc {
      color: #555;
    }

    kbd {
      display: inline-block;
      padding: 2px 6px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
      color: #333;
      box-shadow: 0 1px 0 #bbb;
    }
  </style>
</head>
<body>

  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M4 6h16M4 12h16M4 18h10"/>
      <circle cx="20" cy="18" r="2" fill="currentColor"/>
    </svg>
    <h1>文档逐行高亮</h1>
  </div>

  <!-- 状态 -->
  <div class="section">
    <div class="section-title">状态</div>
    <div class="status-bar">
      <div class="status-info">
        <span class="status-label">当前行 / 总行数</span>
        <span class="status-value" id="statusValue">- / -</span>
      </div>
      <button class="toggle-btn off" id="toggleBtn">开启</button>
    </div>
    <div class="current-text" id="currentText">按 Ctrl+Shift+L 开启</div>
  </div>

  <!-- 跳转 -->
  <div class="section">
    <div class="section-title">跳转到行</div>
    <div class="goto-row">
      <input type="number" class="goto-input" id="gotoInput" min="1" placeholder="输入行号">
      <button class="goto-btn" id="gotoBtn">跳转</button>
    </div>
  </div>

  <!-- 颜色 -->
  <div class="section">
    <div class="section-title">高亮颜色</div>
    <div class="color-row">
      <span class="color-label">背景色</span>
      <input type="color" class="color-input" id="bgColor" value="#fff3b0">
    </div>
    <div class="color-row">
      <span class="color-label">边框色</span>
      <input type="color" class="color-input" id="outlineColor" value="#ffb300">
    </div>
  </div>

  <!-- 快捷键 -->
  <div class="section">
    <div class="section-title">快捷键</div>
    <div class="shortcuts">
      <div class="shortcut-item">
        <span class="shortcut-desc">下一行</span>
        <span><kbd>Ctrl</kbd> + <kbd>↓</kbd></span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-desc">上一行</span>
        <span><kbd>Ctrl</kbd> + <kbd>↑</kbd></span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-desc">开关</span>
        <span><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>L</kbd></span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
